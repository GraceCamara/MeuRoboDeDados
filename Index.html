<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Campeonatos (Local)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        .card { background-color: white; border-radius: 0.75rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
        .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s ease-in-out; }
        .btn-primary { background-color: #4f46e5; color: white; }
        .btn-primary:hover { background-color: #4338ca; }
        .btn-secondary { background-color: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background-color: #d1d5db; }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        .input-field { border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0.75rem; width: 100%; }
        .input-field:focus { outline: 2px solid #4f46e5; border-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const ICONS = {
            trophy: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M9.17 14a3 3 0 0 0 5.66 0"/></svg>,
            list: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>,
            users: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            shield: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            plus: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            trash: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            edit: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>,
            arrowLeft: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            award: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>,
            importExport: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12"/><path d="m19 12-7 7-7-7"/><path d="M12 21v-2"/></svg>,
            stats: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8a6 6 0 0 0-6-6"/><path d="M13 13a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>,
            friendly: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12v3a7 7 0 0 0 7 7h2a7 7 0 0 0 7-7v-3"/><path d="M5 12v-3a7 7 0 0 1 7-7h0a7 7 0 0 1 7 7v3"/><path d="M12 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>,
            close: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
                    <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-md card">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-semibold text-gray-800">{title}</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600">{ICONS.close}</button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        };
        
        const App = () => {
            const [view, setView] = React.useState('dashboard');
            const [participants, setParticipants] = React.useState([]);
            const [tournaments, setTournaments] = React.useState([]);
            const [friendlyMatches, setFriendlyMatches] = React.useState([]);
            const [selectedTournament, setSelectedTournament] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState('');
            
            React.useEffect(() => {
                try {
                    setParticipants(JSON.parse(localStorage.getItem('championship_participants')) || []);
                    setTournaments(JSON.parse(localStorage.getItem('championship_tournaments')) || []);
                    setFriendlyMatches(JSON.parse(localStorage.getItem('championship_friendlies')) || []);
                } catch (e) { setError("Erro ao carregar dados guardados."); }
                setLoading(false);
            }, []);

            const saveData = (key, data) => { try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) { setError("Não foi possível guardar os dados."); } };
            const getParticipantNameById = React.useCallback((id) => participants.find(p => p.id === id)?.name || 'N/A', [participants]);
            
            const addParticipant = (name) => {
                if (!name.trim()) return;
                const updated = [...participants, { id: `p_${Date.now()}`, name }];
                setParticipants(updated);
                saveData('championship_participants', updated);
            };

            const addFriendlyMatch = (matchData) => {
                const { date, p1, p2, s1, s2 } = matchData;
                if (!date || !p1 || !p2 || s1 === '' || s2 === '') { setError("Todos os campos são obrigatórios."); return; }
                const newMatch = { id: `fm_${Date.now()}`, date, participant1Id: p1, participant2Id: p2, participant1Score: parseInt(s1), participant2Score: parseInt(s2) };
                const updated = [...friendlyMatches, newMatch];
                setFriendlyMatches(updated);
                saveData('championship_friendlies', updated);
            };

            const handleDelete = (id, type) => {
                if (!confirm(`Tem a certeza que deseja excluir este ${type}?`)) return;
                if (type === 'participant') { const updated = participants.filter(p => p.id !== id); setParticipants(updated); saveData('championship_participants', updated); }
                else if (type === 'tournament') { const updated = tournaments.filter(t => t.id !== id); setTournaments(updated); saveData('championship_tournaments', updated); }
                else if (type === 'friendly') { const updated = friendlyMatches.filter(f => f.id !== id); setFriendlyMatches(updated); saveData('championship_friendlies', updated); }
            };
            
            const createTournament = (tournamentData) => {
                if (!tournamentData.name.trim() || tournamentData.ids.length < 2) { setError("Nome e pelo menos 2 participantes são necessários."); return; }
                
                let newTournament;

                if (tournamentData.isCompleted) {
                    const { manualKnockout } = tournamentData;
                    const sf1_p1 = manualKnockout.sf1_p1, sf1_s1 = parseInt(manualKnockout.sf1_s1), sf1_p2 = manualKnockout.sf1_p2, sf1_s2 = parseInt(manualKnockout.sf1_s2);
                    const sf2_p1 = manualKnockout.sf2_p1, sf2_s1 = parseInt(manualKnockout.sf2_s1), sf2_p2 = manualKnockout.sf2_p2, sf2_s2 = parseInt(manualKnockout.sf2_s2);
                    const f_s1 = parseInt(manualKnockout.f_s1), f_s2 = parseInt(manualKnockout.f_s2);
                    const f_p1_pens = parseInt(manualKnockout.f_p1_pens || 0), f_p2_pens = parseInt(manualKnockout.f_p2_pens || 0);

                    if (!sf1_p1 || !sf1_p2 || !sf2_p1 || !sf2_p2) { setError("Preencha todos os semifinalistas."); return; }
                    
                    const sf1_winner = sf1_s1 > sf1_s2 ? sf1_p1 : sf1_p2;
                    const sf2_winner = sf2_s1 > sf2_s2 ? sf2_p1 : sf2_p2;
                    
                    let final_winner = null;
                    if (f_s1 > f_s2) final_winner = sf1_winner;
                    else if (f_s2 > f_s1) final_winner = sf2_winner;
                    else if (f_p1_pens > f_p2_pens) final_winner = sf1_winner;
                    else if (f_p2_pens > f_p1_pens) final_winner = sf2_winner;

                    if (!final_winner) { setError("Resultado da final ou dos pênaltis inválido."); return; }
                    
                    const knockoutRounds = [
                        { roundName: "Semifinais", matches: [
                            { matchId: `SF1-manual-${Date.now()}`, participant1Id: sf1_p1, participant2Id: sf1_p2, participant1Score: sf1_s1, participant2Score: sf1_s2, winnerId: sf1_winner, status: 'played' },
                            { matchId: `SF2-manual-${Date.now()}`, participant1Id: sf2_p1, participant2Id: sf2_p2, participant1Score: sf2_s1, participant2Score: sf2_s2, winnerId: sf2_winner, status: 'played' }
                        ]},
                        { roundName: "Final", matches: [
                            { matchId: `F-manual-${Date.now()}`, participant1Id: sf1_winner, participant2Id: sf2_winner, participant1Score: f_s1, participant2Score: f_s2, participant1Penalties: f_s1 === f_s2 ? f_p1_pens : null, participant2Penalties: f_s1 === f_s2 ? f_p2_pens : null, winnerId: final_winner, status: 'played' }
                        ]}
                    ];

                    newTournament = {
                        id: `t_${Date.now()}`, name: tournamentData.name, tournamentDate: tournamentData.date, participantIds: tournamentData.ids,
                        status: 'completed', championId: final_winner, fixtures: [], standings: [], knockoutRounds, createdAt: new Date().toISOString(),
                    };

                } else {
                    newTournament = { 
                        id: `t_${Date.now()}`, 
                        name: tournamentData.name,
                        tournamentDate: tournamentData.date,
                        participantIds: tournamentData.ids,
                        turns: tournamentData.turns,
                        status: 'group_stage', 
                        fixtures: generateFixtures(tournamentData.ids, tournamentData.turns), 
                        standings: initializeStandings(tournamentData.ids, participants), 
                        knockoutRounds: [], 
                        createdAt: new Date().toISOString(), 
                        championId: null 
                    };
                }

                const updated = [...tournaments, newTournament].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                setTournaments(updated);
                saveData('championship_tournaments', updated);
                setView('dashboard');
            };

            const generateFixtures = (pIds, turns) => {
                const fixtures = []; let teams = [...pIds];
                for (let i = teams.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [teams[i], teams[j]] = [teams[j], teams[i]]; }
                if (teams.length % 2) teams.push(null);
                const rounds = teams.length - 1;
                for (let r = 0; r < rounds; r++) { for (let i = 0; i < teams.length / 2; i++) { if (teams[i] && teams[rounds - i]) { const base = { home: teams[i], away: teams[rounds - i], homeScore: null, awayScore: null, status: 'pending', round: r + 1 }; fixtures.push({ ...base, fixtureId: `${base.home}-${base.away}-${r}-1`, turn: 1 }); if (turns === 2) fixtures.push({ ...base, home: base.away, away: base.home, fixtureId: `${base.away}-${base.home}-${r}-2`, turn: 2 }); } } teams.splice(1, 0, teams.pop()); }
                return fixtures.map(f => ({ ...f, homeParticipantId: f.home, awayParticipantId: f.away }));
            };
            
            const initializeStandings = (pIds, allP) => pIds.map(id => ({ participantId: id, participantName: allP.find(p => p.id === id)?.name || 'N/A', played: 0, wins: 0, draws: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, goalDifference: 0, points: 0 }));
            
            const calculateStandings = (fixtures, pIds, allP) => {
                const map = new Map(); pIds.forEach(id => map.set(id, initializeStandings([id], allP)[0]));
                fixtures.forEach(f => { if (f.status === 'played' && f.homeScore !== null) { const home = map.get(f.homeParticipantId), away = map.get(f.awayParticipantId); if (!home || !away) return; home.played++; away.played++; home.goalsFor += f.homeScore; away.goalsFor += f.awayScore; home.goalsAgainst += f.awayScore; away.goalsAgainst += f.homeScore; if (f.homeScore > f.awayScore) { home.wins++; away.losses++; home.points += 3; } else if (f.awayScore > f.homeScore) { away.wins++; home.losses++; away.points += 3; } else { home.draws++; away.draws++; home.points++; away.points++; } } });
                const arr = Array.from(map.values()); arr.forEach(s => s.goalDifference = s.goalsFor - s.goalsAgainst);
                return arr.sort((a,b) => b.points - a.points || b.goalDifference - a.goalDifference || b.goalsFor - a.goalsFor || a.participantName.localeCompare(b.participantName));
            };

            const updateFixtureScore = (tId, fId, hS, aS) => {
                const updated = tournaments.map(t => { if (t.id === tId) { const uF = t.fixtures.map(f => f.fixtureId === fId ? { ...f, homeScore: parseInt(hS), awayScore: parseInt(aS), status: 'played' } : f); const uS = calculateStandings(uF, t.participantIds, participants); const uT = { ...t, fixtures: uF, standings: uS }; if (selectedTournament?.id === tId) setSelectedTournament(uT); return uT; } return t; });
                setTournaments(updated); saveData('championship_tournaments', updated);
            };
            
            const handleViewTournament = (id) => { const t = tournaments.find(t => t.id === id); if(t) { setSelectedTournament(t); setView('tournamentDetails'); } };
            
            const handleStartKnockout = (tId) => {
                const updated = tournaments.map(t => { if (t.id === tId) { const numQ = Math.min(t.standings.length, 4); if (numQ < 2) return t; const qual = t.standings.slice(0, numQ).map(q => q.participantId); let kR = []; const createM = (p1, p2) => ({ participant1Id: p1, participant2Id: p2, participant1Score: null, participant2Score: null, p1Pens: null, p2Pens: null, winnerId: null, status: 'pending' }); if (qual.length === 4) kR = [{ roundName: "Semifinais", matches: [{...createM(qual[0], qual[3]), matchId: `SF1-${Date.now()}`}, {...createM(qual[1], qual[2]), matchId: `SF2-${Date.now()}`}] }, { roundName: "Final", matches: [{...createM(null, null), matchId: `F-${Date.now()}`}] }]; else if (qual.length >= 2) kR = [{ roundName: "Final", matches: [{...createM(qual[0], qual[1]), matchId: `F-${Date.now()}`}] }]; const uT = { ...t, status: 'knockout_stage', knockoutRounds: kR }; setSelectedTournament(uT); return uT; } return t; });
                setTournaments(updated); saveData('championship_tournaments', updated);
            };

            const updateKnockoutScore = (tId, rIdx, mId, p1S, p2S, p1P = null, p2P = null) => {
                const updated = tournaments.map(t => { if (t.id === tId) { let r = JSON.parse(JSON.stringify(t.knockoutRounds)); const m = r[rIdx].matches.find(m => m.matchId === mId); Object.assign(m, { p1S, p2S, p1Pens, p2Pens, status: 'played', winnerId: null }); if (p1S > p2S) m.winnerId = m.participant1Id; else if (p2S > p1S) m.winnerId = m.participant2Id; else if (p1P > p2P) m.winnerId = m.participant1Id; else if (p2P > p1P) m.winnerId = m.participant2Id; let s = t.status, cId = t.championId; if (r[rIdx].roundName === "Semifinais" && m.winnerId) { const f = r.find(r => r.roundName === "Final")?.matches[0]; if (f) { if (m.matchId.startsWith("SF1")) f.participant1Id = m.winnerId; if (m.matchId.startsWith("SF2")) f.participant2Id = m.winnerId; } } if (r[rIdx].roundName === "Final" && m.winnerId) { s = 'completed'; cId = m.winnerId; } const uT = { ...t, knockoutRounds: r, status: s, championId: cId }; setSelectedTournament(uT); return uT; } return t; });
                setTournaments(updated); saveData('championship_tournaments', updated);
            };

            if (loading) return <div className="flex items-center justify-center h-screen text-xl">Carregando...</div>;

            return (
                <div className="min-h-screen">
                    <header className="bg-white/80 backdrop-blur-lg shadow-sm sticky top-0 z-40">
                        <div className="container mx-auto flex justify-between items-center p-4">
                            <div className="flex items-center space-x-3"><span className="text-indigo-600">{ICONS.trophy}</span><h1 className="text-xl md:text-2xl font-bold text-gray-800">Campeonatos</h1></div>
                            <div className="flex items-center space-x-1 md:space-x-2">
                                {[{v:'dashboard', l:'Início'}, {v:'participants', l:'Participantes'}, {v:'friendlyMatch', l:'Amistosos'}, {v:'globalStats', l:'Estatísticas'}, {v:'importExport', l:'Import/Export'}].map(item=><button key={item.v} onClick={()=>{setView(item.v);setSelectedTournament(null);}} className={`px-2 py-1.5 md:px-4 md:py-2 rounded-md transition-colors text-xs md:text-sm font-semibold ${view===item.v?'bg-indigo-600 text-white':'text-gray-600 hover:bg-indigo-100 hover:text-indigo-600'}`}>{item.l}</button>)}
                                <button onClick={()=>setView('createTournament')} className="btn btn-primary ml-2 flex items-center gap-2"><div className="hidden md:block">Novo Torneio</div><div className="md:hidden">{ICONS.plus}</div></button>
                            </div>
                        </div>
                    </header>

                    <main className="container mx-auto p-4 md:p-6">
                        {error && <div className="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert"><p>{error}</p></div>}
                        {view === 'dashboard' && <Dashboard tournaments={tournaments} onViewTournament={handleViewTournament} getParticipantName={getParticipantNameById} onDeleteRequest={(id) => handleDelete(id, 'tournament')} />}
                        {view === 'participants' && <ParticipantsManager participants={participants} onAddParticipant={addParticipant} onDeleteRequest={(id) => handleDelete(id, 'participant')} />}
                        {view === 'createTournament' && <CreateTournamentForm participants={participants} onCreateTournament={createTournament} onBack={() => setView('dashboard')} getParticipantNameById={getParticipantNameById} />}
                        {view === 'globalStats' && <GlobalStatsView participants={participants} tournaments={tournaments} friendlyMatches={friendlyMatches} getParticipantNameById={getParticipantNameById}/>}
                        {view === 'friendlyMatch' && <FriendlyMatchView participants={participants} friendlyMatches={friendlyMatches} onAddMatch={addFriendlyMatch} onDeleteRequest={(id) => handleDelete(id, 'friendly')} getParticipantNameById={getParticipantNameById}/>}
                        {view === 'tournamentDetails' && selectedTournament && <TournamentDetails tournament={selectedTournament} onUpdateScore={updateFixtureScore} onBack={() => setView('dashboard')} onUpdateKnockoutScore={updateKnockoutScore} getParticipantName={getParticipantNameById} onStartKnockout={handleStartKnockout} />}
                        {view === 'importExport' && <ImportExportView participants={participants} setParticipants={setParticipants} setFriendlyMatches={setFriendlyMatches} setTournaments={setTournaments} saveData={saveData} />}
                    </main>
                </div>
            );
        };

        const Dashboard = ({ tournaments, onViewTournament, getParticipantName, onDeleteRequest }) => (
            <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-3">{ICONS.list} Torneios Atuais</h2>
                {tournaments.length === 0 ? <p className="text-gray-500">Nenhum torneio criado ainda. Comece na aba "Novo Torneio"!</p> : <ul className="space-y-3">{tournaments.map(t => {
                    let status = t.status.replace('_',' '); if (t.status === 'completed' && t.championId) status += ` - Campeão: ${getParticipantName(t.championId)}`;
                    return (<li key={t.id} className="flex justify-between items-center p-4 bg-gray-50 hover:bg-gray-100 rounded-lg"><div><span className="font-semibold text-gray-800">{t.name}</span><p className="text-sm text-gray-500">{t.tournamentDate ? new Date(t.tournamentDate).toLocaleDateString() : 'N/D'}</p><p className="text-sm text-indigo-600 font-semibold capitalize">{status}</p></div><div className="flex items-center space-x-3"><button onClick={() => onViewTournament(t.id)} className="btn btn-primary text-sm">Detalhes</button><button onClick={() => onDeleteRequest(t.id)} className="text-gray-400 hover:text-red-500">{ICONS.trash}</button></div></li>);
                })}</ul>}
            </div>
        );

        const ParticipantsManager = ({ participants, onAddParticipant, onDeleteRequest }) => {
            const [name, setName] = React.useState('');
            const handleSubmit = e => { e.preventDefault(); onAddParticipant(name); setName(''); };
            return (<div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">{ICONS.users}Gerir Participantes</h2><form onSubmit={handleSubmit} className="mb-6 flex space-x-3"><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Nome do novo participante" className="input-field flex-grow" /><button type="submit" className="btn btn-primary flex items-center gap-2">{ICONS.plus}Adicionar</button></form><h3 className="text-xl font-semibold mb-3">Lista</h3><ul className="space-y-2">{participants.map(p => <li key={p.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg"><span>{p.name}</span><button onClick={()=>onDeleteRequest(p.id)} className="text-gray-400 hover:text-red-500">{ICONS.trash}</button></li>)}</ul></div>);
        };

        const CreateTournamentForm = ({ participants, onCreateTournament, onBack, getParticipantNameById }) => {
            const [form, setForm] = React.useState({ name: '', date: new Date().toISOString().split('T')[0], ids: [], turns: 1, isCompleted: false, manualKnockout: { sf1_p1: '', sf1_s1: '', sf1_p2: '', sf1_s2: '', sf2_p1: '', sf2_s1: '', sf2_p2: '', sf2_s2: '', f_s1: '', f_s2: '', f_p1_pens: '', f_p2_pens: '' } });
            const handleToggle = id => setForm(f => ({ ...f, ids: f.ids.includes(id) ? f.ids.filter(i => i !== id) : [...f.ids, id] }));
            const handleManualChange = e => setForm(f => ({ ...f, manualKnockout: { ...f.manualKnockout, [e.target.name]: e.target.value } }));
            const handleSubmit = e => { e.preventDefault(); onCreateTournament(form); };
            const selectedParticipants = React.useMemo(() => participants.filter(p => form.ids.includes(p.id)), [participants, form.ids]);
            const semiFinalists = [form.manualKnockout.sf1_p1, form.manualKnockout.sf1_p2, form.manualKnockout.sf2_p1, form.manualKnockout.sf2_p2];
            const finalP1 = form.manualKnockout.sf1_s1 > form.manualKnockout.sf1_s2 ? form.manualKnockout.sf1_p1 : form.manualKnockout.sf1_p2;
            const finalP2 = form.manualKnockout.sf2_s1 > form.manualKnockout.sf2_s2 ? form.manualKnockout.sf2_p1 : form.manualKnockout.sf2_p2;

            return (<div className="card"><button onClick={onBack} className="mb-6 flex items-center gap-2 text-indigo-600 font-semibold">{ICONS.arrowLeft}Voltar</button><h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">{ICONS.shield}Criar Torneio</h2><form onSubmit={handleSubmit} className="space-y-6"><div><label className="font-semibold">Nome do Torneio</label><input type="text" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="input-field mt-1" required/></div><div><label className="font-semibold">Data</label><input type="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="input-field mt-1" required/></div><div><h3 className="font-semibold">Participantes ({form.ids.length})</h3><div className="grid grid-cols-2 md:grid-cols-4 gap-3 max-h-60 overflow-y-auto p-2 border rounded-lg mt-1">{participants.map(p=><label key={p.id} className={`flex items-center space-x-2 p-3 rounded-lg cursor-pointer border-2 ${form.ids.includes(p.id)?'border-indigo-500 bg-indigo-50':'border-gray-200 bg-white'}`}><input type="checkbox" onChange={()=>handleToggle(p.id)} className="form-checkbox text-indigo-600 h-5 w-5"/><span>{p.name}</span></label>)}</div></div><div className="flex items-center space-x-2"><input type="checkbox" id="isCompleted" checked={form.isCompleted} onChange={e => setForm({...form, isCompleted: e.target.checked})} className="h-5 w-5 text-indigo-600 rounded-md" /><label htmlFor="isCompleted" className="font-semibold">Registar torneio já concluído</label></div>
                {!form.isCompleted ? (<div><label className="font-semibold">Turnos</label><div className="flex space-x-4 mt-1"><label className="flex items-center gap-2"><input type="radio" name="turns" checked={form.turns === 1} onChange={()=>setForm({...form,turns:1})}/>1</label><label className="flex items-center gap-2"><input type="radio" name="turns" checked={form.turns === 2} onChange={()=>setForm({...form,turns:2})}/>2</label></div></div>) : (
                    <div className="p-4 border-2 border-dashed rounded-lg space-y-4">
                        <h3 className="font-semibold text-lg text-gray-700">Resultados do Mata-Mata</h3>
                        {/* Semifinal 1 */}
                        <div>
                            <label className="font-medium">Semifinal 1</label>
                            <div className="flex items-center gap-2 mt-1">
                                <select name="sf1_p1" value={form.manualKnockout.sf1_p1} onChange={handleManualChange} className="input-field"><option value="">Jogador A</option>{selectedParticipants.filter(p => !semiFinalists.includes(p.id) || p.id === form.manualKnockout.sf1_p1).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                                <input type="number" name="sf1_s1" value={form.manualKnockout.sf1_s1} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="G" required/>
                                <span>vs</span>
                                <input type="number" name="sf1_s2" value={form.manualKnockout.sf1_s2} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="G" required/>
                                <select name="sf1_p2" value={form.manualKnockout.sf1_p2} onChange={handleManualChange} className="input-field"><option value="">Jogador B</option>{selectedParticipants.filter(p => !semiFinalists.includes(p.id) || p.id === form.manualKnockout.sf1_p2).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                            </div>
                        </div>
                        {/* Semifinal 2 */}
                        <div>
                            <label className="font-medium">Semifinal 2</label>
                            <div className="flex items-center gap-2 mt-1">
                                <select name="sf2_p1" value={form.manualKnockout.sf2_p1} onChange={handleManualChange} className="input-field"><option value="">Jogador C</option>{selectedParticipants.filter(p => !semiFinalists.includes(p.id) || p.id === form.manualKnockout.sf2_p1).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                                <input type="number" name="sf2_s1" value={form.manualKnockout.sf2_s1} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="G" required/>
                                <span>vs</span>
                                <input type="number" name="sf2_s2" value={form.manualKnockout.sf2_s2} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="G" required/>
                                <select name="sf2_p2" value={form.manualKnockout.sf2_p2} onChange={handleManualChange} className="input-field"><option value="">Jogador D</option>{selectedParticipants.filter(p => !semiFinalists.includes(p.id) || p.id === form.manualKnockout.sf2_p2).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                            </div>
                        </div>
                        {/* Final */}
                         <div>
                            <label className="font-medium">Final</label>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="input-field bg-gray-100 text-center">{getParticipantNameById(finalP1) || 'Vencedor SF1'}</span>
                                <input type="number" name="f_s1" value={form.manualKnockout.f_s1} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="G" required/>
                                <span>vs</span>
                                <input type="number" name="f_s2" value={form.manualKnockout.f_s2} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="G" required/>
                                <span className="input-field bg-gray-100 text-center">{getParticipantNameById(finalP2) || 'Vencedor SF2'}</span>
                            </div>
                             {form.manualKnockout.f_s1 !== '' && form.manualKnockout.f_s1 === form.manualKnockout.f_s2 && (
                                <div className="flex items-center gap-2 mt-2">
                                    <span className="text-sm">Pênaltis:</span>
                                    <input type="number" name="f_p1_pens" value={form.manualKnockout.f_p1_pens} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="P1" required/>
                                    <span>-</span>
                                    <input type="number" name="f_p2_pens" value={form.manualKnockout.f_p2_pens} onChange={handleManualChange} className="w-20 p-2 border rounded-md" placeholder="P2" required/>
                                </div>
                            )}
                        </div>
                    </div>
                )}
                <button type="submit" className="w-full btn btn-primary text-lg p-3" disabled={form.isCompleted ? form.ids.length < 4 : form.ids.length < 2}>Criar Torneio</button>
            </form></div>);
        };

        const TournamentDetails = ({ tournament, onUpdateScore, onBack, onUpdateKnockoutScore, getParticipantName, onStartKnockout }) => {
            const [editingFixture, setEditingFixture] = React.useState(null); 
            const [editingKnockoutMatch, setEditingKnockoutMatch] = React.useState(null); 
            const [penaltyData, setPenaltyData] = React.useState(null);
            
            const handleScoreSubmit = (e, isKnockout = false) => {
                e.preventDefault();
                const data = isKnockout ? editingKnockoutMatch : editingFixture;
                const s1 = parseInt(isKnockout ? data.p1Score : data.homeScore);
                const s2 = parseInt(isKnockout ? data.p2Score : data.awayScore);
                if (isKnockout && s1 === s2) { setPenaltyData({ ...data, p1Score: s1, p2Score: s2, p1Penalties: '', p2Penalties: '' }); } 
                else { onUpdateScore(tournament.id, data.fixtureId || data.matchId, s1, s2); }
                setEditingFixture(null); setEditingKnockoutMatch(null);
            };

            const handlePenaltySubmit = e => {
                e.preventDefault();
                const { roundIndex, matchId, p1Score, p2Score, p1Penalties, p2Penalties } = penaltyData;
                if(p1Penalties === p2Penalties) { alert("Pênaltis não podem empatar."); return; }
                onUpdateKnockoutScore(tournament.id, roundIndex, matchId, p1Score, p2Score, parseInt(p1Penalties), parseInt(p2Penalties));
                setPenaltyData(null);
            };

            const allGroupMatchesPlayed = tournament.fixtures.every(f => f.status === 'played');

            return (
                <div className="space-y-8">
                    <button onClick={onBack} className="mb-2 text-indigo-600 font-semibold flex items-center gap-2">{ICONS.arrowLeft}Voltar</button>
                    <div className="card">
                        <div className="mb-4"><h2 className="text-3xl font-bold text-gray-800">{tournament.name}</h2>{tournament.status === 'completed' && <p className="text-xl text-yellow-500 font-semibold flex items-center gap-2 mt-2">{ICONS.award} Campeão: {getParticipantName(tournament.championId)}</p>}</div>
                        {tournament.fixtures.length > 0 && tournament.status === 'group_stage' && (<>
                            <div className="mb-8"><h3 className="text-xl font-semibold mb-3 text-gray-700">Confrontos</h3><div className="grid md:grid-cols-2 gap-4">{tournament.fixtures.map(f => <div key={f.fixtureId} className="p-4 bg-gray-50 rounded-lg border"><p className="text-gray-800">{getParticipantName(f.homeParticipantId)} <b className="text-xl">{f.homeScore ?? '-'}</b> vs <b className="text-xl">{f.awayScore ?? '-'}</b> {getParticipantName(f.awayParticipantId)}</p><div className="mt-2"><button onClick={() => setEditingFixture({ ...f, homeScore: f.homeScore ?? '', awayScore: f.awayScore ?? '' })} className="text-indigo-600 hover:text-indigo-800">{ICONS.edit}</button></div></div>)}</div></div>
                            <div className="mb-8"><h3 className="text-xl font-semibold mb-3 text-gray-700">Classificação</h3><StandingsTable standings={tournament.standings} /></div>
                            {allGroupMatchesPlayed && <button onClick={() => onStartKnockout(tournament.id)} className="w-full btn btn-primary text-lg p-3">Iniciar Mata-Mata</button>}
                        </>)}
                        {tournament.knockoutRounds?.length > 0 && (
                             <div className="mb-8"><h3 className="text-xl font-semibold mb-3 text-gray-700"><span className="text-yellow-500">{ICONS.trophy}</span> Mata-Mata</h3>{tournament.knockoutRounds.map((round, roundIdx) => <div key={roundIdx} className="mb-6"><h4 className="text-lg font-semibold p-2 bg-gray-100 rounded-lg">{round.roundName}</h4><div className="grid md:grid-cols-2 gap-4 mt-2">{round.matches.map(m => <div key={m.matchId} className="p-4 bg-yellow-50 rounded-lg"><p><span className={m.winnerId===m.participant1Id?'font-bold text-green-600':''}>{getParticipantName(m.participant1Id) || 'A definir'}</span> <b className="text-xl">{m.participant1Score??'-'}</b> vs <b className="text-xl">{m.participant2Score??'-'}</b> <span className={m.winnerId===m.participant2Id?'font-bold text-green-600':''}>{getParticipantName(m.participant2Id)||'A definir'}</span></p>{m.participant1Penalties!==null&&<p className="text-xs text-center text-gray-600">({m.participant1Penalties}-{m.participant2Penalties} pen.)</p>}{tournament.status === 'knockout_stage' && <button onClick={()=>setEditingKnockoutMatch({roundIndex:roundIdx, matchId:m.matchId,p1Score:m.participant1Score??'',p2Score:m.participant2Score??''})} className="text-indigo-600 hover:text-indigo-800 mt-2">{ICONS.edit}</button>}</div>)}</div></div>)}</div>
                        )}
                    </div>
                    <Modal isOpen={!!editingFixture} onClose={()=>setEditingFixture(null)} title="Editar Placar"><form onSubmit={(e)=>handleScoreSubmit(e,false)}><div className="flex items-center space-x-2 my-4"><input type="number" min="0" value={editingFixture?.homeScore} onChange={e=>setEditingFixture({...editingFixture,homeScore:e.target.value})} className="input-field" required/><span>X</span><input type="number" min="0" value={editingFixture?.awayScore} onChange={e=>setEditingFixture({...editingFixture,awayScore:e.target.value})} className="input-field" required/></div><button type="submit" className="w-full btn btn-primary">Salvar</button></form></Modal>
                    <Modal isOpen={!!editingKnockoutMatch} onClose={()=>setEditingKnockoutMatch(null)} title="Editar Placar Mata-Mata"><form onSubmit={(e)=>handleScoreSubmit(e,true)}><div className="flex items-center space-x-2 my-4"><input type="number" min="0" value={editingKnockoutMatch?.p1Score} onChange={e=>setEditingKnockoutMatch({...editingKnockoutMatch,p1Score:e.target.value})} className="input-field" required/><span>X</span><input type="number" min="0" value={editingKnockoutMatch?.p2Score} onChange={e=>setEditingKnockoutMatch({...editingKnockoutMatch,p2Score:e.target.value})} className="input-field" required/></div><p className="text-xs text-center">Se empatar, irá para os pênaltis.</p><button type="submit" className="w-full btn btn-primary mt-2">Salvar</button></form></Modal>
                    <Modal isOpen={!!penaltyData} onClose={()=>setPenaltyData(null)} title="Disputa por Pênaltis"><form onSubmit={handlePenaltySubmit}><p className="text-center my-2">{penaltyData?.p1Score}-{penaltyData?.p2Score} no tempo normal</p><div className="flex items-center space-x-2 my-4"><input type="number" min="0" value={penaltyData?.p1Penalties} onChange={e=>setPenaltyData({...penaltyData,p1Penalties:e.target.value})} className="input-field" placeholder="P1" required/><span>X</span><input type="number" min="0" value={penaltyData?.p2Penalties} onChange={e=>setPenaltyData({...penaltyData,p2Penalties:e.target.value})} className="input-field" placeholder="P2" required/></div><button type="submit" className="w-full btn btn-primary">Definir Vencedor</button></form></Modal>
                </div>
            );
        };

        const StandingsTable = ({ standings }) => (
            <div className="overflow-x-auto"><table className="min-w-full bg-white text-sm">
                <thead className="bg-gray-50"><tr>{["#", "Equipa", "P", "J", "V", "E", "D"].map(h=><th key={h} className="px-3 py-3 text-left font-semibold uppercase text-gray-600">{h}</th>)}</tr></thead>
                <tbody className="divide-y divide-gray-200">{standings.map((s, i)=><tr key={s.participantId} className="hover:bg-gray-50">{[i + 1, s.participantName, s.points, s.played, s.wins, s.draws, s.losses].map((d, j)=><td key={j} className={`px-3 py-3 ${j<3?'font-bold text-gray-800': 'text-gray-600'}`}>{d}</td>)}</tr>)}</tbody>
            </table></div>
        );

        const GlobalStatsView = ({ participants, tournaments, friendlyMatches, getParticipantNameById }) => {
            const [stats, setStats] = React.useState({ h2h: [], individual: {}, ranking: [] });
            const [selectedPlayerCard, setSelectedPlayerCard] = React.useState(null);

            React.useEffect(() => {
                if (!participants.length) return;
                const allMatches = [ ...tournaments.flatMap(t => [...(t.fixtures || []), ...(t.knockoutRounds || []).flatMap(r => r.matches)]), ...friendlyMatches.map(f => ({ ...f, homeParticipantId: f.participant1Id, awayParticipantId: f.participant2Id, homeScore: f.participant1Score, awayScore: f.participant2Score })) ].filter(m => m.status === 'played' || m.date);
                const individual = {};
                participants.forEach(p => { individual[p.id] = { name: p.name, J: 0, V: 0, E: 0, D: 0, P: 0, GP: 0, GC: 0, titulos: 0, maiorGoleada: { margin: 0, score: '' } }; });
                tournaments.forEach(t => { if(t.status === 'completed' && t.championId && individual[t.championId]) individual[t.championId].titulos++; });
                allMatches.forEach(m => {
                    const p1_id = m.homeParticipantId || m.participant1Id, p2_id = m.awayParticipantId || m.participant2Id;
                    let s1 = m.homeScore, s2 = m.awayScore;
                    if(m.participant1Score !== undefined && m.participant1Score !== null) s1 = m.participant1Score;
                    if(m.participant2Score !== undefined && m.participant2Score !== null) s2 = m.participant2Score;
                    if (!p1_id || !p2_id || s1 === null || s2 === null) return;
                    const p1 = individual[p1_id], p2 = individual[p2_id];
                    if(!p1 || !p2) return;
                    p1.J++; p2.J++; p1.GP += s1; p1.GC += s2; p2.GP += s2; p2.GC += s1;
                    if (s1 > s2) { p1.V++; p2.D++; p1.P += 3; if(s1-s2 > p1.maiorGoleada.margin) p1.maiorGoleada={margin:s1-s2, score:`${s1}-${s2} vs ${p2.name}`};}
                    else if (s2 > s1) { p2.V++; p1.D++; p2.P += 3; if(s2-s1 > p2.maiorGoleada.margin) p2.maiorGoleada={margin:s2-s1, score:`${s2}-${s1} vs ${p1.name}`};}
                    else { p1.E++; p2.E++; p1.P++; p2.P++; }
                });
                const ranking = Object.entries(individual).map(([id, data]) => ({ id, ...data, aproveitamento: data.J > 0 ? (data.P / (data.J * 3)) * 100 : 0 })).sort((a,b) => b.aproveitamento - a.aproveitamento);
                const h2hPairs = {};
                participants.forEach(p1 => { participants.forEach(p2 => { if (p1.id < p2.id) h2hPairs[`${p1.id}-${p2.id}`] = { p1: p1.id, p2: p2.id, V1: 0, E: 0, V2: 0 }; }); });
                allMatches.forEach(m => {
                    let id1 = m.homeParticipantId || m.participant1Id, id2 = m.awayParticipantId || m.participant2Id;
                    let score1 = m.homeScore, score2 = m.awayScore;
                    if (m.participant1Score !== undefined && m.participant1Score !== null) score1 = m.participant1Score;
                    if (m.participant2Score !== undefined && m.participant2Score !== null) score2 = m.participant2Score;
                    if (!id1 || !id2 || score1 === null || score2 === null) return;
                    if (id1 > id2) { [id1, id2, score1, score2] = [id2, id1, score2, score1]; }
                    const key = `${id1}-${id2}`;
                    if (h2hPairs[key]) { if (score1 > score2) h2hPairs[key].V1++; else if (score2 > score1) h2hPairs[key].V2++; else h2hPairs[key].E++; }
                });
                setStats({ h2h: Object.values(h2hPairs), individual, ranking });
            }, [participants, tournaments, friendlyMatches]);

            return (
                <div className="space-y-8">
                    <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-3">{ICONS.stats} Ranking Geral</h2><div className="overflow-x-auto"><table className="min-w-full bg-white"><thead className="bg-gray-50"><tr>{["#", "Participante", "Aprov. (%)", "P", "J", "V", "E", "D"].map(h => <th key={h} className="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">{h}</th>)}</tr></thead><tbody className="divide-y divide-gray-200">{stats.ranking && stats.ranking.map((s, i) => (<tr key={s.id} className="hover:bg-gray-50"><td className="px-4 py-3 text-sm">{i + 1}</td><td className="px-4 py-3 text-sm font-bold text-gray-800">{s.name}</td><td className="px-4 py-3 text-sm font-bold text-indigo-600">{s.aproveitamento.toFixed(1)}%</td><td className="px-4 py-3 text-sm">{s.P}</td><td className="px-4 py-3 text-sm">{s.J}</td><td className="px-4 py-3 text-sm">{s.V}</td><td className="px-4 py-3 text-sm">{s.E}</td><td className="px-4 py-3 text-sm">{s.D}</td></tr>))}</tbody></table></div></div>
                    <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-3">{ICONS.users}Estatisticas Individuais</h2><div className="grid grid-cols-2 md:grid-cols-4 gap-4">{participants.map(p=><button key={p.id} onClick={()=>setSelectedPlayerCard(stats.individual[p.id])} className="p-3 text-center bg-gray-100 hover:bg-indigo-100 rounded-lg font-semibold text-gray-700">{p.name}</button>)}</div></div>
                    <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-3">{ICONS.friendly}Confrontos Diretos</h2><div className="max-h-96 overflow-y-auto space-y-2 pr-2">{stats.h2h.map(h=>(<div key={`${h.p1}-${h.p2}`} className="p-3 bg-gray-50 rounded-lg grid grid-cols-3 text-center items-center"><span className="font-semibold text-right text-gray-700">{getParticipantNameById(h.p1)}</span><span className="font-bold text-xl mx-2 text-gray-800">{h.V1}x{h.V2}<p className="text-sm font-normal text-gray-500">({h.E} E)</p></span><span className="font-semibold text-left text-gray-700">{getParticipantNameById(h.p2)}</span></div>))}</div></div>
                    {selectedPlayerCard && <Modal isOpen={!!selectedPlayerCard} onClose={()=>setSelectedPlayerCard(null)} title={`Card de ${selectedPlayerCard.name}`}>
                        <div className="p-4 bg-gradient-to-br from-slate-800 to-slate-900 text-white rounded-lg font-mono shadow-2xl">
                            <div className="text-center border-b-2 border-yellow-400 pb-2 mb-4"><h3 className="text-2xl font-bold tracking-wider">{selectedPlayerCard.name}</h3><p className="text-yellow-400 flex items-center justify-center gap-2 font-semibold">{ICONS.trophy}{selectedPlayerCard.titulos} Títulos</p></div>
                            <div className="grid grid-cols-3 text-center my-4"><div><p className="text-4xl font-bold">{selectedPlayerCard.V}</p><p className="text-xs uppercase">Vitórias</p></div><div><p className="text-4xl font-bold">{selectedPlayerCard.E}</p><p className="text-xs uppercase">Empates</p></div><div><p className="text-4xl font-bold">{selectedPlayerCard.D}</p><p className="text-xs uppercase">Derrotas</p></div></div>
                            <div className="text-sm space-y-2 bg-slate-700/50 p-3 rounded-md">
                                <p className="flex justify-between"><span>Aproveitamento:</span> <b className="text-lg">{selectedPlayerCard.J>0?((selectedPlayerCard.P/(selectedPlayerCard.J*3))*100).toFixed(1):0}%</b></p>
                                <p className="flex justify-between"><span>Golos:</span> <b>{selectedPlayerCard.GP} M / {selectedPlayerCard.GC} S</b></p>
                                <p className="flex justify-between"><span>Maior Goleada:</span> <b>{selectedPlayerCard.maiorGoleada.score||'N/A'}</b></p>
                            </div>
                        </div>
                    </Modal>}
                </div>
            );
        };

        const FriendlyMatchView = ({ participants, friendlyMatches, onAddMatch, onDeleteRequest, getParticipantNameById }) => {
            const [match, setMatch] = React.useState({ date: new Date().toISOString().split('T')[0], p1: '', p2: '', s1: '', s2: '' });
            const handleChange = e => setMatch({ ...match, [e.target.name]: e.target.value });
            const handleSubmit = e => { e.preventDefault(); onAddMatch(match); setMatch({ date: new Date().toISOString().split('T')[0], p1: '', p2: '', s1: '', s2: '' }); };
            
            return (
                <div className="space-y-8">
                    <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-6">Adicionar Jogo Amistoso</h2>
                        <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                             <div><label>Data</label><input type="date" name="date" value={match.date} onChange={handleChange} className="input-field mt-1"/></div>
                             <div className="flex items-center gap-2"><select name="p1" value={match.p1} onChange={handleChange} className="input-field"><option value="">Jogador 1</option>{participants.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select><input type="number" name="s1" value={match.s1} onChange={handleChange} className="w-20 p-2 border rounded-md" placeholder="G"/></div>
                             <div className="flex items-center gap-2"><input type="number" name="s2" value={match.s2} onChange={handleChange} className="w-20 p-2 border rounded-md" placeholder="G"/><select name="p2" value={match.p2} onChange={handleChange} className="input-field"><option value="">Jogador 2</option>{participants.filter(p => p.id !== match.p1).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                             <div className="md:col-span-3"><button type="submit" className="w-full btn btn-primary p-3">Adicionar Amistoso</button></div>
                        </form>
                    </div>
                     <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-4">Histórico de Amistosos</h2>
                        <ul className="space-y-2 max-h-96 overflow-y-auto">{friendlyMatches.map(m => (
                            <li key={m.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                <div><span className="text-xs text-gray-500">{new Date(m.date).toLocaleDateString()}</span><p>{getParticipantNameById(m.participant1Id)} <b>{m.participant1Score}</b> x <b>{m.participant2Score}</b> {getParticipantNameById(m.participant2Id)}</p></div>
                                <button onClick={() => onDeleteRequest(m.id)} className="text-gray-400 hover:text-red-500">{ICONS.trash}</button>
                            </li>))}
                        </ul>
                    </div>
                </div>
            );
        };

        const ImportExportView = ({ participants, setParticipants, setFriendlyMatches, setTournaments, saveData }) => {
            const [importText, setImportText] = React.useState('');
            const [exportText, setExportText] = React.useState('');

            const handleImportParticipants = () => {
                const names = importText.split('\n').map(name => name.trim()).filter(Boolean);
                const existingNames = new Set(participants.map(p => p.name.toLowerCase()));
                const newParticipants = names.filter(name => !existingNames.has(name.toLowerCase())).map(name => ({ id: `p_${Date.now()}_${Math.random()}`, name }));
                if (newParticipants.length > 0) { const updated = [...participants, ...newParticipants]; setParticipants(updated); saveData('championship_participants', updated); alert(`${newParticipants.length} novos participantes adicionados!`); } 
                else { alert("Nenhum novo participante para adicionar."); }
                setImportText('');
            };

            const generateExport = () => {
                const allData = { participants: JSON.parse(localStorage.getItem('championship_participants')) || [], tournaments: JSON.parse(localStorage.getItem('championship_tournaments')) || [], friendlyMatches: JSON.parse(localStorage.getItem('championship_friendlies')) || [] };
                setExportText(JSON.stringify(allData, null, 2));
            };

            const handleImportAll = () => {
                if (!confirm("Atenção! Isto irá substituir TODOS os dados atuais. Deseja continuar?")) return;
                try {
                    const data = JSON.parse(importText);
                    if (data.participants && data.tournaments && data.friendlyMatches) {
                        setParticipants(data.participants); setTournaments(data.tournaments); setFriendlyMatches(data.friendlyMatches);
                        saveData('championship_participants', data.participants); saveData('championship_tournaments', data.tournaments); saveData('championship_friendlies', data.friendlyMatches);
                        alert("Dados importados com sucesso!"); setImportText('');
                    } else { throw new Error("Formato de dados inválido."); }
                } catch (e) { alert("Erro ao importar dados. Verifique se o texto está no formato JSON correto."); }
            };

            return (
                <div className="space-y-8">
                    <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-4">Importar Participantes</h2><p className="text-sm text-gray-600 mb-2">Cole uma lista de nomes, um por linha.</p><textarea className="input-field w-full h-32" value={importText} onChange={e => setImportText(e.target.value)} placeholder="Jogador 1&#10;Jogador 2&#10;Jogador 3"></textarea><button onClick={handleImportParticipants} className="mt-2 w-full btn btn-primary">Adicionar Participantes</button></div>
                    <div className="card"><h2 className="text-2xl font-bold text-gray-800 mb-4">Backup e Restauração (JSON)</h2><div className="grid md:grid-cols-2 gap-6"><div><h3 className="text-lg font-medium mb-2">Exportar Todos os Dados</h3><button onClick={generateExport} className="w-full btn btn-secondary mb-2">Gerar Cópia de Segurança</button><textarea readOnly className="w-full h-40 p-2 border rounded-md bg-gray-50" value={exportText} placeholder="Os seus dados em formato JSON aparecerão aqui..."></textarea></div><div><h3 className="text-lg font-medium mb-2">Importar Todos os Dados</h3><p className="text-sm text-red-600 mb-2">Atenção: A importação irá substituir todos os dados existentes.</p><textarea className="w-full h-40 p-2 border rounded-md" value={importText} onChange={e => setImportText(e.target.value)} placeholder="Cole aqui os dados de uma cópia de segurança..."></textarea><button onClick={handleImportAll} className="mt-2 w-full btn btn-danger">Importar e Substituir</button></div></div></div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
